services:
  db:
    image: postgres:17
    container_name: bibletype-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bibletype
      POSTGRES_USER: bibletype
      POSTGRES_PASSWORD: bibletype
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bibletype -d bibletype"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: bibletype-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
